<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Icon: stylized broadcast/news -->
  <rect x="4" y="10" width="40" height="40" rx="10" fill="url(#iconGrad)"/>
  <!-- Newspaper lines -->
  <rect x="11" y="18" width="20" height="3" rx="1.5" fill="#fff" opacity="0.95"/>
  <rect x="11" y="24" width="26" height="2" rx="1" fill="#fff" opacity="0.6"/>
  <rect x="11" y="29" width="22" height="2" rx="1" fill="#fff" opacity="0.45"/>
  <rect x="11" y="34" width="26" height="2" rx="1" fill="#fff" opacity="0.3"/>
  <!-- Broadcast arcs -->
  <path d="M 33 17 Q 40 14 40 22" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M 35 14 Q 44 10 44 22" stroke="#f97316" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Signal dot -->
  <circle cx="32" cy="19" r="2" fill="#fbbf24"/>
  <!-- Text -->
  <text x="54" y="40" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="url(#logoGrad)" letter-spacing="-0.5">
    News Hub
  </text>
</svg>
