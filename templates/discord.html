{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">Discord Configuration</h2>

<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="post" action="/discord">
            <div class="mb-3">
                <label class="form-label">Webhook URL</label>
                <input type="text" name="webhook_url" class="form-control" value="{{ config.webhook_url or '' }}" placeholder="https://discord.com/api/webhooks/...">
                <div class="form-text">Create a webhook in your Discord channel: Server Settings &rarr; Integrations &rarr; Webhooks</div>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="enabled" class="form-check-input" id="enabled" {{ 'checked' if config.enabled else '' }}>
                <label class="form-check-label" for="enabled">Enable Discord delivery</label>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
        </form>

        <hr>
        <form method="post" action="/discord/test">
            <button type="submit" class="btn btn-outline-secondary">Send Test Message</button>
        </form>
    </div>
</div>
{% endblock %}
