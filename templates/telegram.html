{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">Telegram Configuration</h2>

<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="post" action="/telegram">
            <div class="mb-3">
                <label class="form-label">Bot Token</label>
                <input type="text" name="bot_token" class="form-control" value="{{ config.bot_token or '' }}" placeholder="123456:ABC-DEF...">
                <div class="form-text">Get one from <a href="https://t.me/BotFather" target="_blank">@BotFather</a></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Chat ID</label>
                <input type="text" name="chat_id" class="form-control" value="{{ config.chat_id or '' }}" placeholder="Your Telegram chat ID">
                <div class="form-text">Send a message to your bot, then check <code>https://api.telegram.org/bot&lt;TOKEN&gt;/getUpdates</code></div>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="enabled" class="form-check-input" id="enabled" {{ 'checked' if config.enabled else '' }}>
                <label class="form-check-label" for="enabled">Enable Telegram delivery</label>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
        </form>

        <hr>
        <form method="post" action="/telegram/test">
            <button type="submit" class="btn btn-outline-secondary">Send Test Message</button>
        </form>
    </div>
</div>
{% endblock %}
